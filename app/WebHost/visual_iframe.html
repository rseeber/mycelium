<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/style_visual_iframe.css">
    <script type="module" src="/src/main.jsx"></script> 
    <title>Visual Editor</title>
</head>
<body>

<div id="box">


    <div id="floating_editor">
        <div id="row_1">
        </div>
        <div id="row_2">
            <div id="row_2_left_block">
                <h1 id="row_1_app_title">WebHost Editor</h1>
                <form id="template_form">
                    <label for="template_selector">Template: </label>
                    <select name="template" id="template_selector">
                    <!-- Insert options via JS here -->
                    </select>
                    <input type="button" onclick="setTemplate()" value="Select"><br>
                </form>
                <h2 id="page_title"></h2>
                <form id="title_form">
                    <label for="title">Title: </label>
                    <input type="text" id="title">
                    <input type="button" onclick="setTitle()" value="Select">
                </form>
            </div>
            <div id="row_2_right_block">
                <div id="right_block_left">
                    <div id="meta_form_right">
                        <input type="button" onclick="publishSite()" value="Publish Site" id="publish_site_button">
                    </div>
                </div>
                <div id="right_block_right">
                    <label for="default_template">Default Template: </label>
                    <select id="default_template">
                        <!-- Insert options via JS here -->
                    </select>
                    <input type="button" onclick="setDefaultTemplate()" value="Select">
                    <br>
                    <div id="file_explorer">
                        <ul id="file_explorer_list">
                        </ul>
                        <button onclick="createChildPage()">+ Child Page</button>
                        <button onclick="createSiblingPage()">+ Sibling Page</button>
                    </div>
                </div>
            </div>
        </div>


        <form id="meta_form">
            <input type="hidden" id="site" value="exampleSite">
            <input type="hidden" id="frontMatter" value="">
            <!-- 
                <label for="site">Site Name:</label><br>
                <input type="button" onclick="setSite()" value="Submit">
        <div class="site_editor">
            <div id="editor_window">
                <div id="MDXEditorWindow"></div>
            </div>
        </div>
            -->
        </form>
    </div>

    <div id="webpage">
    </div>
    
</div>


</body>
</html>
