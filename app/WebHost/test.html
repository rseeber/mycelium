<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        /*
        Source - https://stackoverflow.com/a/24979148
        Posted by Pebbl, modified by community. See post 'Timeline' for change history
        Retrieved 2026-06-19, License - CC BY-SA 4.0
        */

        html,
        body {
            height: 100%;
            margin: 0;
        }

        .box {
            display: flex;
            flex-flow: column;
            height: 100%;
        }

        .row {
            border: 1px dotted grey;
            margin-left: 8px;
            margin-right: 8px;
        }

        #floating_editor {
            flex: 0 1 auto;
            /* The above is shorthand for:
            flex-grow: 0,
            flex-shrink: 1,
            flex-basis: auto
            */
        }

        #webpage {
            flex: 1 1 auto;
            background-color: aquamarine;
        }

    </style>
    <!--
    Source - https://stackoverflow.com/a/24979148
    Posted by Pebbl, modified by community. See post 'Timeline' for change history
    Retrieved 2026-06-19, License - CC BY-SA 4.0
    -->

    <!-- Obviously, you could use HTML5 tags like `header`, `footer` and `section` -->

    <div class="box">
        <div id="floating_editor" class="row">
            <p><b>header</b>
            <br />
            <br />(sized to content)</p>
        </div>
        <div id="webpage" class="row">
            <p>
            <b>content</b>
            (fills remaining space)
            </p>
        </div>
        <!-- 
        <div class="row footer">
            <p><b>footer</b> (fixed height)</p>
        </div>
        -->
    </div>
</body>
</html>
